<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUAU TO F3X</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(45deg, #0a0a0a, #1a0000, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #ff3333;
            font-family: 'VT323', monospace;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .scanline {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(transparent 50%, rgba(255,0,0,0.05) 50%);
            background-size: 100% 6px;
            pointer-events: none;
            animation: scan 4s linear infinite;
            z-index: 10; opacity: 0.5;
        }

        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(300%); } }

        .header {
            text-align: center; padding: 20px 15px;
            background: rgba(0,0,0,0.9); border-bottom: 4px solid #ff0000;
            text-shadow: 0 0 20px #ff0000; animation: glow 1.5s infinite alternate;
        }

        @keyframes glow { from { text-shadow: 0 0 10px #ff0000; } to { text-shadow: 0 0 40px #ff0000; } }

        .main {
            display: flex; flex-direction: column; gap: 15px;
            padding: 15px; height: calc(100dvh - 140px);
        }

        @media (min-width: 768px) {
            .main { flex-direction: row; height: calc(100dvh - 160px); }
        }

        .panel {
            flex: 1; background: #111111; border: 3px solid #440000;
            border-radius: 10px; display: flex; flex-direction: column;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4); min-height: 300px;
        }

        .panel-header {
            padding: 15px 20px; background: #220000; font-size: 1.8rem;
            border-bottom: 3px solid #ff0000; flex-shrink: 0;
        }

        textarea {
            flex: 1; background: #0a0a0a; color: #ff6666;
            border: none; padding: 18px; font-family: 'VT323', monospace;
            font-size: 1.25rem; line-height: 1.4; resize: none; outline: none;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            scrollbar-width: thin; scrollbar-color: #ff0000 #330000;
        }

        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 4px; }
        textarea::-webkit-scrollbar-track { background: #330000; }

        .controls {
            padding: 15px; display: flex; gap: 12px;
            background: #1a0000; flex-shrink: 0;
        }

        button {
            flex: 1; background: #330000; color: #ff0000;
            border: 3px solid #ff0000; padding: 16px;
            font-size: 1.5rem; cursor: pointer; transition: all 0.2s;
        }

        button:hover, button:active {
            background: #ff0000; color: black;
            transform: scale(1.05); box-shadow: 0 0 25px #ff0000;
        }

        .convert-btn { background: #660000; font-size: 1.7rem; }

        .footer {
            text-align: center; padding: 12px; color: #550000;
            font-size: 1.1rem; border-top: 2px solid #330000;
        }

        .status {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #00ff00; padding: 10px 20px;
            border: 2px solid #00ff00; display: none; z-index: 100; font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="header">
        <h1 style="font-size: 3.8rem; margin: 0; letter-spacing: 6px;">LUAU TO F3X</h1>
        <p style="font-size: 1.5rem; margin: 8px 0 0 0;">Converts skybox / decal scripts into real F3X SyncAPI parts (Btools style)</p>
    </div>

    <div class="main">
        <!-- INPUT -->
        <div class="panel">
            <div class="panel-header">INPUT — Your Luau Code</div>
            <textarea id="input" spellcheck="false">-- Paste your script here (skybox example)

script.Parent.MouseButton1Click:Connect(function()
    game.Lighting:ClearAllChildren()
    local sky=Instance.new("Sky",game.Lighting)
    local i="rbxassetid://133136212718738"
    sky.SkyboxBk=i;sky.SkyboxFt=i;sky.SkyboxLf=i;sky.SkyboxRt=i;sky.SkyboxUp=i;sky.SkyboxDn=i
end)</textarea>
        </div>

        <!-- OUTPUT -->
        <div class="panel">
            <div class="panel-header">OUTPUT — F3X SyncAPI Version</div>
            <textarea id="output" readonly spellcheck="false"></textarea>
            <div class="controls">
                <button onclick="convertCode()" class="convert-btn">CONVERT →</button>
                <button onclick="copyCode()">COPY CODE</button>
            </div>
        </div>
    </div>

    <div class="footer">
        Requires F3X (Btools) in inventory • Creates visible sky part with your ID • Scrollable everywhere
    </div>

    <div id="status" class="status">Copied! Paste into LocalScript</div>

    <script>
        function convertCode() {
            let input = document.getElementById('input').value.trim();
            if (!input) input = "-- No code entered";

            // Clean basic Luau stuff
            let cleaned = input.replace(/:\s*[\w<>\[\]]+/g, '');

            // Detect skybox / lighting pattern
            const hasSkybox = /Skybox|Lighting:ClearAllChildren|Sky\.Skybox/.test(cleaned);

            let output = `-- LUAU TO F3X CONVERTED (SyncAPI)\n`;
            output += `-- Paste this into a LocalScript (F3X/Btools must be in your inventory)\n\n`;

            if (hasSkybox) {
                output += `script.Parent.MouseButton1Click:Connect(function()\n`;
                output += `	local player = game.Players.LocalPlayer\n`;
                output += `	local char = player.Character or player.CharacterAdded:Wait()\n\n`;
                output += `	-- Find SyncAPI (F3X tool)\n`;
                output += `	local tool\n`;
                output += `	for _, v in ipairs(player:GetDescendants()) do\n`;
                output += `		if v.Name == "SyncAPI" then\n`;
                output += `			tool = v.Parent\n`;
                output += `			break\n`;
                output += `		end\n`;
                output += `	end\n`;
                output += `	if not tool then\n`;
                output += `		for _, v in ipairs(game.ReplicatedStorage:GetDescendants()) do\n`;
                output += `			if v.Name == "SyncAPI" then\n`;
                output += `				tool = v.Parent\n`;
                output += `				break\n`;
                output += `			end\n`;
                output += `		end\n`;
                output += `	end\n\n`;
                output += `	if not tool then warn("F3X SyncAPI tool not found! Equip Btools.") return end\n\n`;
                output += `	local remote = tool.SyncAPI.ServerEndpoint\n\n`;
                output += `	local function _(args)\n`;
                output += `		remote:InvokeServer(unpack(args))\n`;
                output += `	end\n\n`;
                output += `	local function CreatePart(cf, parent)\n`;
                output += `		local args = {"CreatePart", "Normal", cf, parent}\n`;
                output += `		_(args)\n`;
                output += `	end\n\n`;
                output += `	local function SetName(part, name)\n`;
                output += `		local args = {"SetName", {[1] = part}, name}\n`;
                output += `		_(args)\n`;
                output += `	end\n\n`;
                output += `	local function AddMesh(part)\n`;
                output += `		local args = {"CreateMeshes", {[1] = {["Part"] = part}}}\n`;
                output += `		_(args)\n`;
                output += `	end\n\n`;
                output += `	local function SetMesh(part, meshid)\n`;
                output += `		local args = {"SyncMesh", {[1] = {["Part"] = part, ["MeshId"] = "rbxassetid://" .. meshid}}}\n`;
                output += `		_(args)\n`;
                output += `	end\n\n`;
                output += `	local function SetTexture(part, texid)\n`;
                output += `		local args = {"SyncMesh", {[1] = {["Part"] = part, ["TextureId"] = "rbxassetid://" .. texid}}}\n`;
                output += `		_(args)\n`;
                output += `	end\n\n`;
                output += `	local function MeshResize(part, size)\n`;
                output += `		local args = {"SyncMesh", {[1] = {["Part"] = part, ["Scale"] = size}}}\n`;
                output += `		_(args)\n`;
                output += `	end\n\n`;
                output += `	local function SetLocked(part, boolean)\n`;
                output += `		local args = {"SetLocked", {[1] = part}, boolean}\n`;
                output += `		_(args)\n`;
                output += `	end\n\n`;
                output += `	-- === SKYBOX / DECAL FUNCTION ===\n`;
                output += `	local function Sky(decalId)\n`;
                output += `		local root = char:WaitForChild("HumanoidRootPart")\n`;
                output += `		local pos = root.CFrame\n`;
                output += `		CreatePart(CFrame.new(math.floor(pos.X), math.floor(pos.Y) + 100, math.floor(pos.Z)), workspace)\n`;
                output += `		wait(0.3)\n`;
                output += `		for _, v in ipairs(workspace:GetDescendants()) do\n`;
                output += `			if v:IsA("BasePart") and v.Name ~= "Sky" then\n`;
                output += `				local cf = v.CFrame\n`;
                output += `				if math.abs(cf.X - math.floor(pos.X)) < 2 and math.abs(cf.Z - math.floor(pos.Z)) < 2 then\n`;
                output += `					SetName(v, "Sky")\n`;
                output += `					AddMesh(v)\n`;
                output += `					SetMesh(v, "8006679977")  -- Common sky mesh (change if needed)\n`;
                output += `					SetTexture(v, decalId)\n`;
                output += `					MeshResize(v, Vector3.new(200, 200, 200))\n`;
                output += `					SetLocked(v, true)\n`;
                output += `					print("F3X Sky created with ID: " .. decalId)\n`;
                output += `					break\n`;
                output += `				end\n`;
                output += `			end\n`;
                output += `		end\n`;
                output += `	end\n\n`;
                output += `	-- CHANGE THIS TO YOUR IMAGE ID\n`;
                output += `	Sky("91484281998170")  -- ← Put your decal/sky ID here\n`;
                output += `end)\n\n`;
                output += `-- Tip: Make sure F3X (Building Tools) is equipped. The sky part spawns high up and gets meshed + textured.`;
            } else {
                // Fallback for normal building scripts
                output += `-- Normal script detected. F3X wrapper not applied.\n`;
                output += cleaned;
            }

            document.getElementById('output').value = output;
        }

        function copyCode() {
            const text = document.getElementById('output').value;
            if (!text || text.includes("No code")) {
                alert("Convert something first, bruh!");
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                const status = document.getElementById('status');
                status.style.display = 'block';
                setTimeout(() => status.style.display = 'none', 1800);
            });
        }

        let timeout;
        document.getElementById('input').addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(convertCode, 600);
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') convertCode();
        });

        window.onload = convertCode;
    </script>
</body>
</html>
